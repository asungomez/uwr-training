# Monorepo pre-commit hooks. Runs only on changed files.
# Install once with:  pre-commit install
# Run on everything:  pre-commit run --all-files
minimum_pre_commit_version: '3.5.0'

repos:
  # Generic, language-agnostic hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        # tsconfig files are JSONC (comments allowed); skip the strict JSON parse.
        exclude: ^front-end/tsconfig.*\.json$
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: mixed-line-ending

  # Front-end: ESLint + Prettier. The wrapper runs them in a container (the
  # checker image), so neither the host nor a running dev stack needs node_modules.
  - repo: local
    hooks:
      - id: eslint
        name: eslint (front-end)
        language: system
        entry: docker/precommit-frontend.sh eslint
        files: ^front-end/.*\.(ts|tsx|js|jsx)$
        require_serial: true
      - id: prettier
        name: prettier (front-end)
        language: system
        entry: docker/precommit-frontend.sh prettier
        files: ^front-end/.*\.(ts|tsx|js|jsx|css|html|json|md|yml|yaml)$
        require_serial: true

  # API (Python): Ruff lint + format, scoped to api/.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff
        name: ruff (api)
        args: [--fix]
        files: ^api/.*\.py$
      - id: ruff-format
        name: ruff-format (api)
        files: ^api/.*\.py$

  # API (Python): mypy in strict mode. additional_dependencies give it the
  # type stubs it needs to resolve imports in its isolated hook env.
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        name: mypy (api)
        files: ^api/.*\.py$
        # Alembic migrations are autogenerated; don't strict-type them.
        exclude: ^api/alembic/
        args: [--strict, --config-file=api/pyproject.toml]
        additional_dependencies:
          - fastapi>=0.115.0
          - pydantic>=2.0.0
          - sqlalchemy[asyncio]>=2.0.0
          - asyncpg>=0.30.0
          - bcrypt>=4.2.0
          - pyjwt>=2.10.0
