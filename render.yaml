services:
  - type: web
    name: uwr-training-frontend
    runtime: static
    rootDir: front-end
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    # The SPA calls same-origin /api/* (no VITE_API_URL needed). Routes are
    # evaluated top-to-bottom, so proxy /api before the SPA catch-all.
    routes:
      # Proxy API calls to the back-end. `*` in the destination is replaced by
      # whatever /api/ captured, so /api/db-health -> <api>/db-health.
      - type: rewrite
        source: /api/*
        destination: https://uwr-training-api.onrender.com/*
      # SPA: serve index.html for client-side routes instead of 404.
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

  - type: web
    name: uwr-training-api
    runtime: python
    plan: free
    region: frankfurt
    rootDir: api
    # uv manages deps; install it, then sync from the locked versions.
    buildCommand: pip install uv && uv sync --frozen
    # Apply migrations, then start the server. (preDeployCommand needs a paid
    # plan, so on free tier we migrate in the start command instead.) `migrate`
    # skips the upgrade when the DB is already at head, so routine restarts
    # (cold-start wake-ups, crashes) start the server without the migration delay.
    # Render injects $PORT; uvicorn must bind to it on all interfaces.
    startCommand: uv run python -m app.cli migrate && uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # No CORS_ORIGINS needed: the front-end proxies /api same-origin, so the
      # browser never makes a cross-origin request. (The CORS middleware stays in
      # the app with a localhost default for direct/local access.)
      # Connection string injected from the managed Postgres instance below.
      - key: DATABASE_URL
        fromDatabase:
          name: uwr-training-db
          property: connectionString
      # Signs session-cookie JWTs. Generated once by Render and kept stable so
      # existing sessions survive restarts/deploys.
      - key: SECRET_KEY
        generateValue: true
      # S3 for exercise media. All `sync: false` vars are NOT stored in this file
      # or synced from it — Render creates them empty on first Blueprint sync and
      # you fill them in the dashboard (Environment tab), where they persist and
      # are never overwritten by later pushes. The bucket name leaks the storage
      # location, so even the non-credential values are kept out of source here.
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_PUBLIC_BASE_URL
        sync: false
      # Empty = talk to real AWS S3 (only set for an S3-compatible endpoint like
      # MinIO). Hard-coded empty so prod never accidentally points at localhost.
      - key: S3_ENDPOINT_URL
        value: ""

databases:
  - name: uwr-training-db
    plan: free
    region: frankfurt
    databaseName: uwr
    user: uwr
