services:
  - type: web
    name: uwr-training-frontend
    runtime: static
    rootDir: front-end
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      # Baked into the build; points the SPA at the deployed API.
      # fromService only exposes the bare host (no scheme), and Vite needs a full
      # URL, so we use the predictable Render URL for the uwr-training-api service.
      - key: VITE_API_URL
        value: https://uwr-training-api-tu0v.onrender.com
    # SPA: serve index.html for client-side routes instead of 404.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

  - type: web
    name: uwr-training-api
    runtime: python
    plan: free
    rootDir: api
    # uv manages deps; install it, then sync from the locked versions.
    buildCommand: pip install uv && uv sync --frozen
    # Apply migrations, then start the server. (preDeployCommand needs a paid
    # plan, so on free tier we migrate in the start command instead.)
    # Render injects $PORT; uvicorn must bind to it on all interfaces.
    startCommand: uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Front-end origin(s) allowed by CORS.
      - key: CORS_ORIGINS
        value: https://uwr-training-frontend.onrender.com
      # Connection string injected from the managed Postgres instance below.
      - key: DATABASE_URL
        fromDatabase:
          name: uwr-training-db
          property: connectionString

databases:
  - name: uwr-training-db
    plan: free
    databaseName: uwr
    user: uwr
