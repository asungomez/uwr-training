services:
  - type: web
    name: muncher-frontend
    runtime: static
    rootDir: front-end
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    # SPA: serve index.html for client-side routes instead of 404.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
