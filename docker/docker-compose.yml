services:
  checker:
    build:
      context: ..
      dockerfile: docker/dockerfiles/checker.Dockerfile
    image: uwr-training-checker
    container_name: pre_commit
    environment:
      # Tells front-end/precommit.sh it's already in a container, so it runs
      # eslint/prettier directly instead of trying to launch another container.
      PRECOMMIT_IN_CONTAINER: "1"
    volumes:
      - ..:/repo
      - precommit-cache:/cache/pre-commit
      # Linux-native front-end deps live in this volume so they don't clash
      # with the host's macOS-built node_modules.
      - frontend-node-modules:/repo/front-end/node_modules
    working_dir: /repo
    entrypoint: ["/repo/docker/entrypoints/checker.sh"]

  frontend:
    build:
      context: ..
      dockerfile: docker/dockerfiles/frontend.Dockerfile
    image: uwr-training-frontend
    container_name: frontend
    ports:
      - "5173:5173"
    environment:
      # Vite dev proxy forwards /api here (compose service name on the network).
      API_PROXY_TARGET: http://api:8000
    depends_on:
      - api
    volumes:
      # Live source for hot-reload. Anonymous volume on node_modules keeps the
      # container's Linux-native deps from being shadowed by the host mount.
      - ../front-end:/app/front-end
      - /app/front-end/node_modules
    working_dir: /app/front-end
    command: ["npm", "run", "dev"]

  api:
    build:
      context: ..
      dockerfile: docker/dockerfiles/api.Dockerfile
    image: uwr-training-api
    container_name: api
    ports:
      - "8000:8000"
    environment:
      # asyncpg driver; host `db` is the compose service name.
      DATABASE_URL: postgresql+asyncpg://uwr:uwr@db:5432/uwr
      # Local dev is plain HTTP, so don't mark the session cookie Secure.
      COOKIE_SECURE: "false"
      # S3 media via MinIO. The API only SIGNS upload URLs (no network call), and
      # the signed URL is handed to the browser — so it must point at the
      # host-reachable endpoint (localhost), not the compose service name.
      S3_BUCKET: uwr-media
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_ENDPOINT_URL: http://localhost:9000
      S3_PUBLIC_BASE_URL: http://localhost:9000/uwr-media
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Live source for uvicorn --reload. The venv lives at /opt/venv (outside
      # this mount), so the host bind doesn't shadow installed dependencies.
      - ../api:/app/api
    working_dir: /app/api
    command:
      ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  # One-off admin CLI (`make admin`). `profiles` keeps it out of `make run`.
  admin:
    build:
      context: ..
      dockerfile: docker/dockerfiles/api.Dockerfile
    image: uwr-training-api
    profiles: ["tools"]
    environment:
      # Defaults to the local db; `make admin db-connection-string=...` overrides.
      DATABASE_URL: ${ADMIN_DATABASE_URL:-postgresql+asyncpg://uwr:uwr@db:5432/uwr}
    volumes:
      - ../api:/app/api
    working_dir: /app/api

  # S3-compatible object storage for exercise media (dev + e2e).
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API (browser uploads here via presigned POST)
      - "9001:9001" # web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot: create the media bucket and make it public-read, then exit.
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/uwr-media &&
      mc anonymous set download local/uwr-media
      "

  db:
    image: postgres:16
    container_name: db
    environment:
      POSTGRES_USER: uwr
      POSTGRES_PASSWORD: uwr
      POSTGRES_DB: uwr
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uwr -d uwr"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  precommit-cache:
  frontend-node-modules:
  db-data:
  minio-data:
