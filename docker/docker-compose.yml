services:
  checker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: uwr-training-checker
    container_name: pre_commit
    volumes:
      - ..:/repo
      - precommit-cache:/cache/pre-commit
      # Linux-native front-end deps live in this volume so they don't clash
      # with the host's macOS-built node_modules.
      - frontend-node-modules:/repo/front-end/node_modules
    working_dir: /repo
    entrypoint: ["/repo/docker/entrypoint.sh"]

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    image: uwr-training-frontend
    container_name: frontend
    ports:
      - "5173:5173"
    environment:
      # Vite dev proxy forwards /api here (compose service name on the network).
      API_PROXY_TARGET: http://api:8000
    depends_on:
      - api
    volumes:
      # Live source for hot-reload. Anonymous volume on node_modules keeps the
      # container's Linux-native deps from being shadowed by the host mount.
      - ../front-end:/app/front-end
      - /app/front-end/node_modules
    working_dir: /app/front-end
    command: ["npm", "run", "dev"]

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    image: uwr-training-api
    container_name: api
    ports:
      - "8000:8000"
    environment:
      # asyncpg driver; host `db` is the compose service name.
      DATABASE_URL: postgresql+asyncpg://uwr:uwr@db:5432/uwr
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Live source for uvicorn --reload. The venv lives at /opt/venv (outside
      # this mount), so the host bind doesn't shadow installed dependencies.
      - ../api:/app/api
    working_dir: /app/api
    command:
      ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  db:
    image: postgres:16
    container_name: db
    environment:
      POSTGRES_USER: uwr
      POSTGRES_PASSWORD: uwr
      POSTGRES_DB: uwr
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uwr -d uwr"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  precommit-cache:
  frontend-node-modules:
  db-data:
